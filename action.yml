name: "enkii"
description: "Open-source AI code review for GitHub PRs. Bring your own OpenRouter key. No vendor lock-in."
branding:
  icon: "eye"
  color: "purple"

inputs:
  openrouter_api_key:
    description: "OpenRouter API key (required). Generate at https://openrouter.ai/keys."
    required: true
  github_token:
    description: "GitHub token. Defaults to ${{ github.token }} if unset. Set this if you need a custom GitHub App token."
    required: false
    default: ${{ github.token }}
  review_model:
    description: "Model used for code review. Defaults to '@preset/enkii' which expects an OpenRouter preset named 'enkii' on the consumer's account (recommended for caching). Override with any OpenRouter model id (e.g. 'deepseek/deepseek-v4-pro') if you don't want to use a preset."
    required: false
    default: "@preset/enkii"
  security_model:
    description: "Model used for security review. Same convention as review_model."
    required: false
    default: "@preset/enkii"
  review_skill_path:
    description: "Path to a custom review skill markdown file (relative to repo root). Empty = use bundled default."
    required: false
    default: ""
  security_skill_path:
    description: "Path to a custom security review skill markdown file (relative to repo root). Empty = use bundled default."
    required: false
    default: ""

outputs:
  contains_trigger:
    description: "Whether the event matched an enkii trigger (true/false)"
    value: ${{ steps.prepare.outputs.contains_trigger }}
  enkii_command:
    description: "The dispatched command (review/security/help/status/skip)"
    value: ${{ steps.prepare.outputs.enkii_command }}
  enkii_comment_id:
    description: "ID of the tracking comment, when one was created"
    value: ${{ steps.prepare.outputs.enkii_comment_id }}

runs:
  using: "composite"
  steps:
    - name: Mask OpenRouter API key
      shell: bash
      run: echo "::add-mask::${{ inputs.openrouter_api_key }}"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.11

    - name: Setup Node (for Codex CLI install)
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Codex CLI
      shell: bash
      run: |
        npm install -g @openai/codex@0.125.0
        codex --version

    - name: Install enkii dependencies
      shell: bash
      run: |
        cd "${GITHUB_ACTION_PATH}"
        bun install --frozen-lockfile

    - name: Prepare enkii (validate, trigger detection, dispatch)
      id: prepare
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/prepare.ts"
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        REVIEW_MODEL: ${{ inputs.review_model }}
        SECURITY_MODEL: ${{ inputs.security_model }}
        REVIEW_SKILL_PATH: ${{ inputs.review_skill_path }}
        SECURITY_SKILL_PATH: ${{ inputs.security_skill_path }}
        DEFAULT_WORKFLOW_TOKEN: ${{ github.token }}

    - name: Run code review (Pass 1 + Pass 2)
      id: run_review
      if: steps.prepare.outputs.contains_trigger == 'true' && steps.prepare.outputs.enkii_command == 'review'
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/run-review.ts"
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        REVIEW_MODEL: ${{ inputs.review_model }}
        REVIEW_SKILL_PATH: ${{ inputs.review_skill_path }}

    - name: Post code review comments
      id: post_review
      if: steps.run_review.outputs.validated_path != ''
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/post-review.ts"
      env:
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        VALIDATED_PATH: ${{ steps.run_review.outputs.validated_path }}
        ENKII_REVIEW_KIND: code

    - name: Run security review (Pass 1 + Pass 2)
      id: run_security_review
      if: steps.prepare.outputs.contains_trigger == 'true' && steps.prepare.outputs.enkii_command == 'security'
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/run-security-review.ts"
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        SECURITY_MODEL: ${{ inputs.security_model }}
        SECURITY_SKILL_PATH: ${{ inputs.security_skill_path }}

    - name: Post security review comments
      id: post_security_review
      if: steps.run_security_review.outputs.validated_path != ''
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/post-review.ts"
      env:
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        VALIDATED_PATH: ${{ steps.run_security_review.outputs.validated_path }}
        ENKII_REVIEW_KIND: security

    - name: Reply to @enkii (help / status)
      if: steps.prepare.outputs.contains_trigger == 'true' && (steps.prepare.outputs.enkii_command == 'help' || steps.prepare.outputs.enkii_command == 'status' || steps.prepare.outputs.enkii_command == 'default')
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/post-help.ts"
      env:
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        ENKII_COMMAND: ${{ steps.prepare.outputs.enkii_command }}
