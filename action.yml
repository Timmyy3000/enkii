name: "enkii"
description: "Open-source AI code review for GitHub PRs. Bring your own OpenRouter key. No vendor lock-in."
branding:
  icon: "eye"
  color: "purple"

inputs:
  openrouter_api_key:
    description: "OpenRouter API key (required). Generate at https://openrouter.ai/keys."
    required: true
  github_token:
    description: "GitHub token. If unset, the action falls back to the runner's automatic GITHUB_TOKEN (i.e. github.token). Set this only if you need a custom GitHub App token."
    required: false
    default: ""
  review_model:
    description: "Model used for code review. Defaults to '@preset/enkii' which expects an OpenRouter preset named 'enkii' on the consumer's account (recommended for caching). Override with any OpenRouter model id (e.g. 'deepseek/deepseek-v4-pro') if you don't want to use a preset."
    required: false
    default: "@preset/enkii"
  security_model:
    description: "Model used for security review. Same convention as review_model."
    required: false
    default: "@preset/enkii"
  review_skill_path:
    description: "Path to a custom review skill markdown file (relative to repo root). Empty = use bundled default."
    required: false
    default: ""
  security_skill_path:
    description: "Path to a custom security review skill markdown file (relative to repo root). Empty = use bundled default."
    required: false
    default: ""
  enable_validator:
    description: "Run a Pass 2 validator after the candidate pass. Higher quality, ~2× latency. Default: false (single-pass)."
    required: false
    default: "false"
  run_security:
    description: "On automatic PR events, run the security review alongside the code review (in parallel). Set 'false' to require explicit @enkii /security. Default: true."
    required: false
    default: "true"

outputs:
  contains_trigger:
    description: "Whether the event matched an enkii trigger (true/false)"
    value: ${{ steps.enkii.outputs.contains_trigger }}
  code_review_id:
    description: "ID of the code review submitted to GitHub, when one was posted"
    value: ${{ steps.enkii.outputs.code_review_id }}
  security_review_id:
    description: "ID of the security review submitted to GitHub, when one was posted"
    value: ${{ steps.enkii.outputs.security_review_id }}

runs:
  using: "composite"
  steps:
    - name: Mask OpenRouter API key
      shell: bash
      run: echo "::add-mask::${{ inputs.openrouter_api_key }}"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.11

    - name: Setup Node (for Codex CLI install)
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Codex CLI
      shell: bash
      run: |
        npm install -g @openai/codex@0.125.0
        codex --version

    - name: Install enkii dependencies
      shell: bash
      run: |
        cd "${GITHUB_ACTION_PATH}"
        bun install --frozen-lockfile

    - name: Run enkii
      id: enkii
      shell: bash
      run: |
        bun run "${GITHUB_ACTION_PATH}/src/entrypoints/main.ts"
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token != '' && inputs.github_token || github.token }}
        DEFAULT_WORKFLOW_TOKEN: ${{ github.token }}
        REVIEW_MODEL: ${{ inputs.review_model }}
        SECURITY_MODEL: ${{ inputs.security_model }}
        REVIEW_SKILL_PATH: ${{ inputs.review_skill_path }}
        SECURITY_SKILL_PATH: ${{ inputs.security_skill_path }}
        ENABLE_VALIDATOR: ${{ inputs.enable_validator }}
        RUN_SECURITY: ${{ inputs.run_security }}
