name: enkii review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: enkii-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run enkii (dogfood current repo version)
        uses: ./.
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional overrides:
          # review_model: "@preset/enkii"
          # security_model: "@preset/enkii"
          # enable_validator: "true"
          # run_security: "true"
